fitter:
  sims_h5: products/simulations/v001/simulations.h5
  processed_h5: "products/processed_maps/v001/processed_maps.h5"

  targets:
    - planck353_pr3
    - planck217_pr3
    - planck143_pr3
    - planck100_pr3
    - planck070_cosmo
    - planck044_cosmo 
    - planck030_cosmo
    - wmapK_cosmo
    - wmapKa_cosmo 
    - wmapQ1_cosmo
    - wmapQ2_cosmo
    - wmapV1_cosmo
    - wmapV2_cosmo
    - wmapW1_cosmo
    - wmapW2_cosmo
    - wmapW3_cosmo
    - wmapW4_cosmo
    - cbass_spass


  components:
    - name: synchrotron
      cls_name: SynchPowerLaw
      template_name: synchrotron
      stokes: [I, Q, U]

      # component-param -> global-param
      params_map:
        A: A_s
        beta: beta_s

      fixed_params:
        nu0_ghz: 4.76
      init:
        A: 1.0
        beta: -3.1

      priors:
        - type: bounds
          params:
            A: [0, null]
            beta: [-5, -2]

        - type: normal
          params:
            beta: [-3.1, 0.5]

    - name: dust
      cls_name: ThermalDust
      stokes: ["I","Q","U"]
      template_name: thermal_dust
      params_map:
        A: A_d
        beta_d: beta_d
        T_d: T_d
      fixed_params:
        nu0_ghz: 353.0
      init:
        A: 1.0
        beta_d: 1.8
        T_d: 20.0
      priors:
        - type: bounds
          params:
            A: [0, null]
            beta_d: [0.5, 2.5]
            T_d: [5.0, 50.0]
        - type: normal
          params:
            beta_d: [1.8, 0.3]
            T_d: [20.0, 5.0]

    - name: freefree
      cls_name: FreeFree
      stokes: ["I"]
      template_name: freefree
      params_map:
        Te: Te
      init:
        Te: 7000.0
      priors:
        - type: bounds
          params: {Te: [2000.0, 20000.0]}
        - type: normal
          params: {Te: [7000.0, 2000.0]}

    - name: spinningdust
      cls_name: SpinningDustLogNorm
      stokes: ["I"]
      template_name: thermal_dust
      params_map:
        A: A_sd
        W: W
        nu0_peak: nu0_peak
      fixed_params:
        nu0_ghz: 30.0
      init:
        A: 0.5
        W: 2.0
        nu0_peak: 30.0
      priors:
        - type: bounds
          params:
            A: [0, null]
            W: [0.1, 10.0]
            nu0_peak: [5.0, 100.0]


  include_gain_params_in_corner: false

  outputs:
    save_samples: true
    save_summary: true
    plots:
      corner: true
      trace: true
      resid_hist: true
      resid_maps: true
      spectrum: true
    posterior_predictive:
      enabled: true
      ndraw: 200


  mcmc:
    burn_steps: 500
    burn_stages: 1
    prod_steps: 2500
    prod_burnin: 1500
    thin: 1
    nwalkers: 64
    prune_every: 250

  validation:
    enabled: false
    grid_ids: [grid_000]
    region_ids: []
    # Optional per-grid map overrides:
    # target_groups_by_grid:
    #   grid_000:
    #     planck353_pr3: planck353_pr3
    # Optional per-grid HDF5 source overrides:
    # grid_sources:
    #   grid_000: products/simulations/v001/simulations.h5
    mcmc:
      burn_steps: 80
      burn_stages: 1
      prod_steps: 220
      prod_burnin: 60
      thin: 1
      nwalkers: 32
      prune_every: 100
    tolerances:
      sigma_ratio_min: 0.5
      sigma_ratio_max: 1.5
      corr_diff_norm_max: 1.0
      pull_abs_max: 3.0
    fail_on_exceed: false
